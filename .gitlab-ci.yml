stages:
  - lint
  - build
  - test
  - docs
  - release
  - deploy

variables:
  DOCKERFILE: ${CI_PROJECT_DIR}/Dockerfile
  RELEASE_REGISTRY: docker.io
  RELEASE_REGISTRY_IMAGE: index.docker.io/magentaaps/os2mo-naldo
  IMAGE_SHA: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}

  PRODUCT: os2mo
  COMPONENT: naldo

# Conditions
#############
# Global Conditions
.if-tag: &if-tag
  if: "$CI_COMMIT_TAG"

.if-default-branch-refs: &if-default-branch-refs
  if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

.if-merge-request: &if-merge-request
  if: "$CI_MERGE_REQUEST_IID"

include:
  # Pull in the MO backing-services template so we can reuse it here
  - project: "rammearkitektur/os2mo"
    file: "gitlab-ci-templates/integration-test-meta.v1.yml"
  - project: "labs/salt-automation"
    file:
      - gitlab-ci-templates/common/no-interrupt-meta.v1.yml
      - gitlab-ci-templates/common/conventional-commits.v1.yml
      - gitlab-ci-templates/common/conventional-commits-changelog.v1.yml
      - gitlab-ci-templates/common/docker-build-meta.v2.yml
      - gitlab-ci-templates/common/docker-release.v1.yml
      - gitlab-ci-templates/common/config-updater-salt.v1.yml
      - gitlab-ci-templates/common/config-updater-flux.v1.yml

# Workflow
###########
workflow:
  rules:
    - <<: *if-tag
    - <<: *if-default-branch-refs
    - <<: *if-merge-request

default:
  # All jobs are interruptible by default
  interruptible: true

Pre-commit:
  image: python:3.9
  stage: lint
  before_script:
    - pip install pre-commit
  script:
    - pre-commit run --all-files

Svelte-check:
  image: node:20
  stage: lint
  script:
    - cd web/
    - yarn
    - yarn run check

Unit tests:
  image: node:20
  stage: test
  script:
    - cd web/
    - yarn
    - yarn test

E2E tests:
  image: node:20
  stage: test
  variables:
    # MO backend env — mirrors .variables:mo from the os2mo template
    DB_HOST: "mox-db"
    DB_NAME: "mox"
    DB_USER: "mox"
    DB_PASSWORD: "mox"
    KEYCLOAK_SCHEMA: "http"
    KEYCLOAK_PORT: "8080"
    KEYCLOAK_AUTH_SERVER_URL: "http://keycloak:8080/auth/"
    KEYCLOAK_VERIFY_AUDIENCE: "false"
    ENVIRONMENT: "testing"
    LORA_AUTH: "false"
    INSECURE_ENABLE_TESTING_API: "true"
    AMQP_ENABLE: "true"
    AMQP_URL: "amqp://guest:guest@msg-broker:5672/"
    # Naldo's runtime backend URL (read by $env/dynamic/public at preview start)
    PUBLIC_BASE_URL: "http://mo:5000"
    # Playwright: browser navigates to naldo, API calls go to mo directly
    BASE_URL: "http://localhost:4173"
    MO_URL: "http://mo:5000"
  services:
    - !reference [.services:mo-backing, services]
    - name: magentaaps/os2mo:latest
      alias: mo
      variables:
        DB_HOST: "mox-db"
        DB_NAME: "mox"
        DB_USER: "mox"
        DB_PASSWORD: "mox"
        KEYCLOAK_SCHEMA: "http"
        KEYCLOAK_PORT: "8080"
        KEYCLOAK_AUTH_SERVER_URL: "http://keycloak:8080/auth/"
        KEYCLOAK_VERIFY_AUDIENCE: "false"
        ENVIRONMENT: "testing"
        LORA_AUTH: "false"
        INSECURE_ENABLE_TESTING_API: "true"
        AMQP_ENABLE: "true"
        AMQP_URL: "amqp://guest:guest@msg-broker:5672/"
      entrypoint:
        - "sh"
        - "-c"
        - |
          while ! ./docker/start.sh; do sleep 1; done
  before_script:
    # Wait for Keycloak + backing services
    - !reference [.services:mo-backing, before_script]
    # Wait for MO to be ready — globalSetup will purge, seed the org, and snapshot
    # Build naldo and start the preview server pointing at the mo service
    - cd web && yarn install
    - yarn build
    - PUBLIC_BASE_URL=http://mo:5000 yarn preview &
    - until wget -qO /dev/null http://localhost:4173; do sleep 1; done
    # Install Playwright browsers
    - yarn playwright install --with-deps chromium
  script:
    - cd web && yarn test:e2e
  artifacts:
    when: on_failure
    paths:
      - web/playwright-report/
    expire_in: 7 days
  rules:
    - <<: *if-merge-request
    - <<: *if-default-branch-refs

SvelteKit build:
  image: node:20
  stage: build
  script:
    - cd web/
    - yarn
    - yarn build

Build Naldo:
  extends:
    - .build-docker
  variables:
    BUILD_DOCKER_EXTRA_FLAGS: --build-arg=COMMIT_TAG=${CI_COMMIT_TAG}
